<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ProxyX - Advanced Bypass</title>
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
   <header class="bg-dark text-white text-center p-4">
        ProxyX - Advanced Bypass
   </header>
   <section id="proxy" class="container mt-5">
       <div class="row justify-content-center">
           <div class="col-md-6">
               <h2>Enter URL to Access</h2>
               <form id="proxyForm">
                   <div class="form-group">
                       <input type="text" class="form-control" id="url" placeholder="Enter URL" required>
                   </div>
                   <button type="submit" class="btn btn-primary w-100">Go</button>
               </form>
           </div>
       </div>
   </section>
   <section id="result" class="container mt-5">
       <div class="row justify-content-center">
           <div class="col-md-8">
               <div class="card">
                   <div class="card-body">
                       <iframe id="proxyFrame" width="100%" height="500"></iframe>
                   </div>
               </div>
           </div>
       </div>
   </section>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
   <script>
       $(document).ready(function() {
           $('#proxyForm').submit(function(e) {
               e.preventDefault();
               var url = $('#url').val();
               $('#proxyFrame').attr('src', url);
           });
       });
   </script>
</body>
</html>
